name: Nightly DB backup (WP-8)

on:
  schedule:
    # 20:00 UTC = 01:30 IST — well outside typical field-entry hours (per org EOD cutoff 20:00 IST).
    - cron: '0 20 * * *'
  workflow_dispatch: {} # lets you trigger a backup manually from the Actions tab, e.g. to test

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No apt/PGDG install step needed — backup-db.sh runs pg_dump via the official
      # `postgres` Docker image (pinned to Neon's major version), which GitHub-hosted
      # runners already have Docker for. Avoids apt package-availability/PATH fragility.
      - name: Run backup
        env:
          DATABASE_URL_ADMIN: ${{ secrets.DATABASE_URL_ADMIN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: bash backend/scripts/backup-db.sh
