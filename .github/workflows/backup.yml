name: Nightly DB backup (WP-8)

on:
  schedule:
    # 20:00 UTC = 01:30 IST — well outside typical field-entry hours (per org EOD cutoff 20:00 IST).
    - cron: '0 20 * * *'
  workflow_dispatch: {} # lets you trigger a backup manually from the Actions tab, e.g. to test

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client 18 (matches Neon's server version)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Run backup
        env:
          DATABASE_URL_ADMIN: ${{ secrets.DATABASE_URL_ADMIN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: bash backend/scripts/backup-db.sh
